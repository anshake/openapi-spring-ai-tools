name: Release

# Release is not atomic: the "Release X" commit and tag are pushed before the
# GitHub Release is created and before the next -SNAPSHOT is committed. If a run
# fails after the tag is pushed, main is left on the release version. To recover:
#   1. delete the tag if it was pushed:  git push --delete origin vX.Y.Z
#   2. reset main back to before the "Release X" commit and force-push
#   3. re-run this workflow
#
# When "publish" is enabled, the artifacts are also signed and pushed to Maven
# Central after the GitHub Release is created (the last major step before the
# -SNAPSHOT bump). A Central publish cannot be undone. Because the release
# commit and tag are already pushed by this point, a failed publish cannot be
# retried by naively re-running the workflow (it would fail at "Commit and tag
# release" since the tag already exists) — first follow the recovery steps
# above to delete the tag and reset main, then re-run. Note that if the upload
# actually reached Central and published, re-running will be rejected as a
# duplicate; recovery only helps when publishing failed before that point.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
      publish:
        description: 'Also publish to Maven Central'
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version }}

    steps:
      - name: Ensure running on main
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Release must be run from main, got $GITHUB_REF"
            exit 1
          fi

      - name: Validate version
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '$RELEASE_VERSION' (expected X.Y.Z)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Set release version
        run: mvn versions:set -DnewVersion="$RELEASE_VERSION" -DgenerateBackupPoms=false

      - name: Build and test
        run: mvn clean verify -Dgpg.skip=true

      - name: Commit and tag release
        run: |
          git commit -am "Release $RELEASE_VERSION"
          git tag -a "v$RELEASE_VERSION" -m "Release $RELEASE_VERSION"
          git push --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: v${{ env.RELEASE_VERSION }}
          files: target/openapi-spring-ai-tools-${{ env.RELEASE_VERSION }}.jar
          generate_release_notes: true

      - name: Import GPG key
        if: ${{ inputs.publish }}
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Configure Maven settings
        if: ${{ inputs.publish }}
        uses: s4u/maven-settings-action@v3.0.0
        with:
          servers: |
            [{
              "id": "central",
              "username": "${{ secrets.CENTRAL_TOKEN_USERNAME }}",
              "password": "${{ secrets.CENTRAL_TOKEN_PASSWORD }}"
            }]

      - name: Deploy to Maven Central
        if: ${{ inputs.publish }}
        run: mvn --batch-mode clean deploy
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Set next development version
        run: |
          mvn org.codehaus.mojo:build-helper-maven-plugin:3.6.1:parse-version versions:set \
            -DnewVersion='${parsedVersion.majorVersion}.${parsedVersion.minorVersion}.${parsedVersion.nextIncrementalVersion}-SNAPSHOT' \
            -DgenerateBackupPoms=false

      - name: Commit next development version
        run: |
          git commit -am "Prepare for next development iteration"
          git push
